apis:
  - aid: netflix:netflix-open-connect
    name: Netflix Open Connect
    description: >-
      Netflix Open Connect is the purpose-built content delivery network that
      delivers Netflix streaming traffic. The Open Connect program provides
      partner ISPs with embedded appliances and peering arrangements to localize
      Netflix traffic and improve member streaming quality.
    humanURL: https://openconnect.netflix.com/
    tags:
      - CDN
      - ISP
      - Open Connect
      - Peering
      - Streaming
    properties:
      - type: Documentation
        url: https://openconnect.netflix.com/en/
      - type: Deployment Guide
        url: https://openconnect.netflix.com/en/deployment-guide/
      - type: Peering
        url: https://openconnect.netflix.com/en/peering/
      - type: Contact
        url: https://openconnect.netflix.com/en/contact-us/
  - aid: netflix:netflix-partner-help-center
    name: Netflix Partner Help Center
    description: >-
      The Netflix Partner Help Center provides resources for device
      manufacturers, integrators, and content partners. It documents device
      certification requirements, integration specifications, and support
      processes for partners building Netflix-enabled products.
    humanURL: https://partnerhelp.netflixstudios.com/
    tags:
      - Certification
      - Device Integration
      - Partners
    properties:
      - type: Documentation
        url: https://partnerhelp.netflixstudios.com/
