aid: netflix
name: Netflix
description: >-
  Netflix is a streaming entertainment service operating one of the world's
  largest content delivery networks. While Netflix does not publish a general
  public consumer API, it operates partner programs including Open Connect for
  ISP CDN integration and device certification programs for manufacturers
  embedding the Netflix application.
type: Index
