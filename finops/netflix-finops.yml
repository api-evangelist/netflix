specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Netflix
providerId: netflix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - CDN
  - Streaming
  - Open Connect
notes: Netflix does not sell a public developer API; there is no FinOps surface to reconcile. The artifact
  here documents the partner-program billing shape (zero-cost Open Connect appliances to qualifying ISPs,
  contractual Device Partner terms) for completeness.
description: 'FOCUS-aligned FinOps for Netflix: Netflix has no publicly billable API. Open Connect partner
  ISP appliances are provided at no cost in exchange for hosting / power / peering. Device Partner Program
  is contractual.'
sources:
  - https://openconnect.netflix.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Netflix, Inc.
serviceCategory: Media + CDN
billingModel:
  pricingCategory: Partner Program (No Cost) + Enterprise Contract
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Adjustment
focusColumns:
  ServiceName: Netflix Open Connect / Device Partner Program
  ServiceCategory: Media
  ServiceSubcategory: CDN + Device Certification
  ProviderName: Netflix
  PublisherName: Netflix, Inc.
  InvoiceIssuerName: Netflix, Inc.
  BillingCurrency: USD
  PricingCategory: Free + Contract
meters:
  - name: open_connect_appliance
    description: Open Connect Appliances deployed to ISP partner POPs.
    unit: appliance-month
    aggregation: avg
    dimensions:
      - region
      - partner
  - name: peering_traffic
    description: Settlement-free peering traffic delivered through Open Connect.
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - partner
  - name: device_partner_contract
    description: Device Partner Program contractual obligations.
    unit: contract-month
    aggregation: sum
    dimensions:
      - partner
principles:
  - name: Visibility
    description: Open Connect partners receive traffic and cache-fill telemetry through the Open Connect
      partner portal; Netflix internally tracks egress savings vs. transit.
  - name: Allocation
    description: Netflix attributes Open Connect deployments per partner and per POP for capacity planning.
  - name: Optimization
    description: Netflix optimizes by deploying appliances closer to viewers (fill at off-peak, serve
      at peak) — partners save transit costs in exchange for hosting.
  - name: Accountability
    description: Open Connect partner team owns appliance fleet TCO; Device Partner team owns certification
      and contractual SLAs.
maintainers:
