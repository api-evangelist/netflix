openapi: 3.1.0
info:
  title: Netflix API
  description: >-
    Netflix provides partner APIs for content delivery network integration and device certification. The Open Connect program enables ISPs and device manufacturers to optimize Netflix streaming delivery.
  version: '1.0'
  contact:
    name: Netflix Developer Support
    url: https://openconnect.netflix.com/
externalDocs:
  description: Documentation
  url: https://openconnect.netflix.com/
servers:
  - url: https://api.netflix.com
    description: Production
tags:
  - name: Streaming
    description: Streaming operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Streaming
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
