specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Netflix
providerId: netflix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - CDN
  - Content Delivery
  - Open Connect
  - Streaming
  - Media
notes: Netflix does not publish a general public developer API. The Open Connect program (CDN appliances
  and peering) is delivered free of charge to qualifying ISP partners. The Device Certification program
  for manufacturers also operates without a public price book. Consumer streaming subscriptions exist
  but are not API products. There are no public per-tier API plans to reconcile.
description: Netflix's external-facing programs (Open Connect ISP partner program, Device Partner Program)
  are partner-onboarded rather than publicly priced. Open Connect Appliances and the associated peering
  are provided to qualifying ISPs at no cost. Netflix retired its public consumer Catalog / Recommendations
  API in 2014 and currently has no general developer API offering with published pricing.
sources:
  - https://openconnect.netflix.com/
  - https://partnerhelp.netflixstudios.com/
plans:
  - id: netflix-open-connect-isp
    name: Open Connect — ISP Partner Program
    type: freemium
    description: Free Open Connect Appliances and peering for qualifying ISPs.
    entries:
      - label: Open Connect Appliance
        name: oca_partnership
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Embedded CDN appliances
      - name: Settlement-free peering
      - name: Co-located deployments
      - name: Partner onboarding required
  - id: netflix-device-partner
    name: Device Partner Program
    type: enterprise
    description: Manufacturer certification program for embedding the Netflix application on consumer
      devices. Custom commercial terms.
    entries:
      - label: Partner contract
        name: device_partner_contract
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Device certification
      - name: Netflix Ready Device program
      - name: Partner onboarding required
