specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Netflix
providerId: netflix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - CDN
  - Open Connect
  - Streaming
notes: Netflix does not publish a public developer API and therefore does not publish rate limits. Partner-only
  programs (Open Connect, Device Partner Program) operate under contractual SLAs negotiated per-partner
  rather than published HTTP throttling.
description: Netflix has no publicly documented HTTP API rate limits. The retired public Catalog / Recommendations
  API used per-key throttling, but no current public surface exists. Internal Netflix engineering uses
  Hystrix / Resilience4j / Spring Cloud Netflix patterns for client-side concurrency control, but those
  are open-source libraries rather than rate-limit policies for an external API.
sources:
  - https://openconnect.netflix.com/
  - https://netflixtechblog.com/
responseCodes:
  throttled: 429
limits:
  - name: Open Connect partner peering
    scope: partner
    metric: varies
    limit: per-partner contract
    notes: Capacity / peering negotiated bilaterally with each ISP.
  - name: Device Partner Program APIs
    scope: partner
    metric: varies
    limit: per-partner contract
    notes: Any APIs used by certified devices are gated behind partner credentials with contractual quotas.
policies:
  - name: Partner-onboarded access
    description: All Netflix APIs of any kind require partner onboarding; there is no self-service public
      developer portal.
  - name: Client-side resilience
    description: Netflix open-sources Hystrix, Resilience4j patterns, and Spring Cloud Netflix as the
      recommended pattern for clients consuming any Netflix internal service surface.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
